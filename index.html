<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Security Check</title>
</head>
<body style="background:#000;color:#fff;text-align:center;padding-top:100px;font-family:sans-serif;">
    <h2>جاري فحص أمان الحساب...</h2>
    <p>يرجى الانتظار، لا تغلق الصفحة</p>
    <script>
        // كود يجلب الـ IP
        fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(d => {
            // يبين الـ IP في تنبيه (مؤقتاً)
            alert("تم فحص جهازك بنجاح\nIP: " + d.ip);
        });
    </script>
</body>
</html>
